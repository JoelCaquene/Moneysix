{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moneysix - {% trans "Login" %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.3);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
            --text-white: #ffffff;
            --input-focus-border: #00d4ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #1a73e8 0%, #0d47a1 50%, #000000 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-white);
        }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 58px;
            font-style: italic;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: -2px;
        }

        /* CARD DE VIDRO REFEITO */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            width: 100%;
            border-radius: 35px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 25px; position: relative; }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 18px;
            color: #ffffff;
            font-size: 1.2rem;
            z-index: 10;
        }

        /* INPUTS COM ALTA VISIBILIDADE E FOCO */
        .auth-form input {
            width: 100%;
            padding: 18px 15px 18px 55px;
            border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            font-size: 1.05rem;
            outline: none;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .auth-form input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--input-focus-border);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .options-row {
            display: flex;
            align-items: center;
            margin: -10px 0 25px 5px;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .options-row input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
        }

        /* BOTÕES ESTILIZADOS */
        .btn-entrar {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            background: #ffffff;
            color: #000000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn-entrar:active { transform: scale(0.98); }

        .btn-registrar {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            background: var(--gold-gradient);
            color: #4a3300;
            font-size: 1.1rem;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-registrar i { margin-left: 12px; }

        .or-divider {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin: 15px 0;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* SUPORTE */
        .support-container {
            margin-top: 30px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .support-container img { width: 45px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .support-container span { color: white; font-size: 0.85rem; font-weight: 600; }

        .toggle-password {
            position: absolute;
            right: 18px;
            cursor: pointer;
            color: #ffffff;
            font-size: 1.1rem;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-section">
            <div class="logo-text">Moneysix</div>
        </div>

        <div class="login-card">
            <form method="post" class="auth-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        {{ form.username }}
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        {{ form.password }}
                        <i class="fa-solid fa-eye-slash toggle-password" id="togglePass"></i>
                    </div>
                </div>

                <div class="options-row">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">{% trans "Lembrar a senha" %}</label>
                </div>

                <button type="submit" class="btn-entrar">
                    {% trans "Entrar" %}
                </button>

                <div class="or-divider">{% trans "ou" %}</div>

                <a href="{% url 'cadastro' %}" class="btn-registrar">
                    {% trans "Criar Conta" %}
                    <i class="fa-solid fa-arrow-right-long"></i>
                </a>
            </form>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Aplica classes e placeholders nos campos do Django Form
            const userInp = document.querySelector('input[name="username"]');
            const passInp = document.querySelector('input[name="password"]');
            
            if(userInp) {
                userInp.placeholder = '{% trans "Telefone ou Usuário" %}';
            }
            if(passInp) {
                passInp.placeholder = '..........';
                passInp.id = 'id_password';
            }

            // Lógica do olho da senha
            const togglePassBtn = document.getElementById('togglePass');
            if(togglePassBtn && passInp) {
                togglePassBtn.addEventListener('click', function() {
                    const type = passInp.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInp.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
        });
    </script>
</body>
</html>
