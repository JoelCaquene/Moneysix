{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>moneysix - {% trans "Cadastro" %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.3);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
            --text-white: #ffffff;
            --input-focus-border: #00d4ff; /* Cor vibrante ao tocar/focar */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #1a73e8 0%, #0d47a1 50%, #000000 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-white);
        }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 58px;
            font-style: italic;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: -2px;
        }

        .register-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            width: 100%;
            border-radius: 35px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 25px; position: relative; }
        
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* ÍCONES COM ALTA VISIBILIDADE */
        .input-wrapper i.main-icon {
            position: absolute;
            left: 18px;
            color: #ffffff; /* Branco puro para legibilidade */
            font-size: 1.2rem;
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.2));
        }

        /* ESTILO DO FORMULÁRIO ONDE VOCÊ MARCOU */
        .auth-form input, .country-code-select {
            width: 100%;
            padding: 16px 15px 16px 55px;
            border: 2px solid var(--glass-border); /* Borda mais visível */
            background: rgba(255, 255, 255, 0.15); /* Fundo mais nítido */
            border-radius: 18px;
            font-size: 1.05rem;
            outline: none;
            color: #ffffff; /* Letra branca para ser legível */
            transition: all 0.3s ease;
        }

        /* COR DO PLACEHOLDER (Texto de exemplo) */
        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        /* EFEITO AO TOCAR/CLICAR (ONDE VOCÊ MARCOU) */
        .auth-form input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--input-focus-border);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .input-phone { padding-left: 110px !important; }

        .country-code-select {
            position: absolute;
            left: 5px;
            width: 95px;
            border: none;
            background: transparent;
            font-weight: 800;
            z-index: 11;
            color: #ffffff;
            height: 100%;
            padding-left: 15px;
            cursor: pointer;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            cursor: pointer;
            color: #ffffff;
            font-size: 1.1rem;
            z-index: 10;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-register {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            background: #ffffff;
            color: #000000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-register i { margin-left: 12px; }

        .btn-login-link {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            background: var(--gold-gradient);
            color: #4a3300;
            font-size: 1.1rem;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
        }

        .separator-text {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin: 5px 0;
            font-weight: 600;
        }
        
        /* Ajuste para ícones das bandeiras no select */
        option { background: #0d47a1; color: #fff; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-section">
            <div class="logo-text">moneysix</div>
        </div>

        <div class="register-card">
            <form method="post" class="auth-form" id="registerForm">
                {% csrf_token %}

                <div class="form-group">
                    <label>{% trans "Número de Telefone" %}</label>
                    <div class="input-wrapper">
                        <select class="country-code-select" name="country_code">
                            <option value="+244">AO +244</option>
                            <option value="+351">PT +351</option>
                            <option value="+55">BR +55</option>
                        </select>
                        <input type="text" name="phone_number" class="input-phone" placeholder="" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>{% trans "Palavra Passe" %}</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-fingerprint main-icon"></i>
                        <input type="password" name="password" id="password" placeholder="{% trans 'Crie sua senha' %}" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('password', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>{% trans "Repita Senha" %}</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-circle-check main-icon"></i>
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="{% trans 'Repita a senha' %}" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('confirm_password', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>{% trans "Código de Convite" %}</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-ticket main-icon"></i>
                        <input type="text" name="invited_by_code" placeholder="{% trans 'Opcional' %}" value="{{ request.GET.invite|default:'' }}">
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="submit" class="btn-register">
                        {% trans "Criar Conta" %}
                        <i class="fa-solid fa-arrow-right-long"></i>
                    </button>

                    <div class="separator-text">{% trans "ou" %}</div>

                    <a href="{% url 'login' %}" class="btn-login-link">
                        {% trans "Já tenho conta" %}
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePass(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                el.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
